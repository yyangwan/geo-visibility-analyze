# Production overlay — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
version: "3.8"

services:
  backend:
    # Override: no volume mount, no --reload (Dockerfile default is production mode)
    volumes: []
    command: []
    restart: unless-stopped

  frontend:
    volumes: []
    restart: unless-stopped

  nginx:
    restart: unless-stopped
