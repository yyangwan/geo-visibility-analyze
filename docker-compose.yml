version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiscope
      POSTGRES_PASSWORD: aiscope
      POSTGRES_DB: aiscope
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      AISCOPE_DATABASE_URL: postgresql+asyncpg://aiscope:aiscope@postgres:5432/aiscope
      AISCOPE_DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      AISCOPE_QWEN_API_KEY: ${QWEN_API_KEY}
    depends_on:
      - postgres
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres-data:
