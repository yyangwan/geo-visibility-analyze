version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_USER: aiscope
      MYSQL_PASSWORD: aiscope
      MYSQL_DATABASE: aiscope
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      AISCOPE_DATABASE_URL: mysql+aiomysql://aiscope:aiscope@mysql:3306/aiscope
      AISCOPE_DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      AISCOPE_QWEN_API_KEY: ${QWEN_API_KEY}
      AISCOPE_DOUBAO_API_KEY: ${DOUBAO_API_KEY}
      AISCOPE_KIMI_API_KEY: ${KIMI_API_KEY}
      AISCOPE_WENXIN_API_KEY: ${WENXIN_API_KEY}
      AISCOPE_HUNYUAN_API_KEY: ${HUNYUAN_API_KEY}
      # Optional: override LLM used for prompt generation and suggestions
      AISCOPE_LLM_API_KEY: ${LLM_API_KEY:-}
      AISCOPE_LLM_BASE_URL: ${LLM_BASE_URL:-}
      AISCOPE_LLM_MODEL: ${LLM_MODEL:-}
      # Auth
      AISCOPE_SECRET_KEY: ${AISCOPE_SECRET_KEY:?AISCOPE_SECRET_KEY must be set}
      # CORS (comma-separated origins, default: allow all)
      AISCOPE_CORS_ORIGINS: ${AISCOPE_CORS_ORIGINS:-*}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./backend:/app
    # Dev override: use --reload for hot-reloading
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql-data:
